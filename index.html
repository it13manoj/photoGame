<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎭 Face Studio Pro · fixed!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1512;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 0.6rem;
            margin: 0;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            background: #2d2722;
            border-radius: 48px;
            padding: 1rem 1rem 1.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 0 2px #4d3f35;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #f2e3d0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            margin-bottom: 0.6rem;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        h1 span {
            background: #4d3f35;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .camera-box {
            background: #0d0a08;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #4f3f33;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
            margin-bottom: 0.8rem;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            z-index: 1;
        }

        #photoCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 10;
            pointer-events: none;
        }

        .camera-box .placeholder {
            color: #5f4d3d;
            font-size: 1rem;
            background: #1f1813;
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            border: 2px dashed #4f3f33;
            z-index: 5;
            text-align: center;
            position: absolute;
        }

        /* Face effect overlay - draws on top of video */
        .face-filter-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 8;
            pointer-events: none;
        }
        .face-filter-layer canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Sticker layer */
        .sticker-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }
        .sticker-layer img {
            position: absolute;
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            user-select: none;
            pointer-events: auto;
            cursor: grab;
            border-radius: 14px;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(2px);
            padding: 4px;
        }
        .sticker-layer img:active {
            cursor: grabbing;
        }

        .text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            pointer-events: none;
        }
        .text-overlay div {
            position: absolute;
            color: white;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.5);
            pointer-events: auto;
            cursor: grab;
            padding: 4px 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.15);
            user-select: none;
            font-family: 'Segoe UI', 'Quicksand', sans-serif;
            letter-spacing: 0.5px;
            line-height: 1.2;
            max-width: 90%;
            word-break: break-word;
        }
        .text-overlay div:active {
            cursor: grabbing;
        }

        /* toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            margin-bottom: 0.6rem;
            background: #3b322b;
            padding: 0.4rem 0.6rem;
            border-radius: 50px;
            border: 2px solid #5a4b3e;
        }

        .toolbar button,
        .toolbar label {
            background: #524138;
            border: none;
            border-radius: 40px;
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #f2e3d0;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            cursor: pointer;
            border: 2px solid #6b5a4c;
            box-shadow: 0 3px 0 #2d211b;
            transition: all 0.05s linear;
            flex-shrink: 0;
        }
        .toolbar button:active,
        .toolbar label:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #2d211b;
        }
        .toolbar button.primary {
            background: #b5855a;
            border-color: #dbaa7a;
            color: #1f1610;
            box-shadow: 0 3px 0 #7a5b3f;
        }
        .toolbar button.danger {
            background: #a8534a;
            border-color: #cf6f64;
            color: #1f1610;
            box-shadow: 0 3px 0 #713b34;
        }
        .toolbar input[type="file"] {
            display: none;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            background: #2d241e;
            padding: 0.2rem 0.4rem;
            border-radius: 30px;
            border: 2px solid #4f3f33;
        }
        .filter-btn {
            background: transparent;
            border: 2px solid transparent;
            border-radius: 30px;
            padding: 0.1rem 0.5rem;
            font-size: 0.6rem;
            font-weight: 600;
            color: #cbb7a3;
            cursor: pointer;
            transition: all 0.1s;
        }
        .filter-btn.active {
            background: #b5855a;
            border-color: #eac39c;
            color: #1f1610;
        }

        .sticker-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
            justify-content: center;
            margin-bottom: 0.5rem;
            background: #332a23;
            padding: 0.3rem 0.4rem;
            border-radius: 50px;
            border: 2px solid #4f3f33;
        }
        .sticker-picker span {
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0 0.15rem;
            transition: transform 0.1s;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            user-select: none;
        }
        .sticker-picker span:active {
            transform: scale(0.8);
        }

        .text-input-row {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .text-input-row input {
            flex: 1;
            min-width: 120px;
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            border: 2px solid #4f3f33;
            background: #2d241e;
            color: #f2e3d0;
            font-size: 0.9rem;
            outline: none;
            font-weight: 500;
        }
        .text-input-row input::placeholder {
            color: #8a7a6a;
        }
        .text-input-row button {
            background: #5a4a3d;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #f2e3d0;
            border: 2px solid #6b5a4c;
            box-shadow: 0 3px 0 #2d211b;
            cursor: pointer;
            transition: all 0.05s;
            white-space: nowrap;
        }
        .text-input-row button:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #2d211b;
        }

        .face-effect-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            justify-content: center;
            margin-bottom: 0.5rem;
            background: #332a23;
            padding: 0.3rem;
            border-radius: 50px;
            border: 2px solid #4f3f33;
        }
        .face-effect-btn {
            background: #524138;
            border: 2px solid #6b5a4c;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            color: #f2e3d0;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 #2d211b;
            transition: all 0.05s;
            flex-shrink: 0;
        }
        .face-effect-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #2d211b;
        }
        .face-effect-btn.active {
            background: #b5855a;
            border-color: #dbaa7a;
            color: #1f1610;
        }

        #statusMsg {
            text-align: center;
            color: #d6c3b0;
            font-size: 0.8rem;
            margin-top: 0.4rem;
            min-height: 1.6rem;
            padding: 0.2rem;
            background: #2d241e;
            border-radius: 30px;
            border: 2px solid #4f3f33;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        @media (max-width: 420px) {
            .app-container {
                padding: 0.6rem;
            }
            .toolbar button,
            .toolbar label {
                font-size: 0.55rem;
                padding: 0.25rem 0.5rem;
            }
            .sticker-picker span {
                font-size: 1.4rem;
            }
            .sticker-layer img {
                width: 48px;
                height: 48px;
            }
            .text-overlay div {
                font-size: 22px;
            }
            .text-input-row input {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" role="main">
        <h1>🎭 face <span>studio</span></h1>

        <div class="camera-box" id="cameraBox">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="photoCanvas"></canvas>
            <div class="face-filter-layer" id="faceFilterLayer">
                <canvas id="faceFilterCanvas"></canvas>
            </div>
            <div class="placeholder" id="camPlaceholder">📷 camera ready</div>
            <div class="sticker-layer" id="stickerLayer"></div>
            <div class="text-overlay" id="textOverlay"></div>
        </div>

        <div class="sticker-picker" id="stickerPicker">
            <span data-sticker="🐶">🐶</span>
            <span data-sticker="🐱">🐱</span>
            <span data-sticker="🐼">🐼</span>
            <span data-sticker="🦊">🦊</span>
            <span data-sticker="🐸">🐸</span>
            <span data-sticker="⭐">⭐</span>
            <span data-sticker="🌈">🌈</span>
            <span data-sticker="🍕">🍕</span>
            <span data-sticker="🎈">🎈</span>
            <span data-sticker="🧸">🧸</span>
            <span data-sticker="❤️">❤️</span>
            <span data-sticker="🔥">🔥</span>
            <span data-sticker="👑">👑</span>
            <span data-sticker="🎃">🎃</span>
        </div>

        <div class="text-input-row">
            <input type="text" id="textInput" placeholder="✏️ write text..." maxlength="30">
            <button id="addTextBtn">➕ add</button>
            <button id="clearTextBtn" class="danger" style="background:#a8534a;border-color:#cf6f64;box-shadow:0 3px 0 #713b34;">🗑️</button>
        </div>

        <div class="face-effect-row" id="faceEffectRow">
            <button class="face-effect-btn active" data-effect="none">😐 off</button>
            <button class="face-effect-btn" data-effect="sunglasses">😎 sunglasses</button>
            <button class="face-effect-btn" data-effect="mustache">🧔 mustache</button>
            <button class="face-effect-btn" data-effect="clown">🤡 clown</button>
            <button class="face-effect-btn" data-effect="robot">🤖 robot</button>
            <button class="face-effect-btn" data-effect="glasses">👓 glasses</button>
            <button class="face-effect-btn" data-effect="crown">👑 crown</button>
        </div>

        <div class="toolbar">
            <button id="captureBtn" class="primary">📸 take</button>
            <button id="selfieBtn" class="primary">🤳 selfie</button>
            <label for="uploadInput" id="uploadLabel">🖼️ upload</label>
            <input type="file" id="uploadInput" accept="image/*">
            <button id="clearPhotoBtn" class="danger">🗑️ clear</button>
            <button id="saveBtn" style="background:#5a7a5a;border-color:#6a9a6a;box-shadow:0 3px 0 #3a5a3a;">💾 save</button>
            <div class="filter-group">
                <span style="color:#cbb7a3; font-weight:500; font-size:0.6rem;">filter</span>
                <button class="filter-btn active" data-filter="none">off</button>
                <button class="filter-btn" data-filter="grayscale">b&w</button>
                <button class="filter-btn" data-filter="sepia">sepia</button>
                <button class="filter-btn" data-filter="warm">warm</button>
                <button class="filter-btn" data-filter="cool">cool</button>
            </div>
        </div>

        <div id="statusMsg">📷 real-time face filters! point & shoot</div>
    </div>

    <script>
        (function() {
            // DOM refs
            const video = document.getElementById('video');
            const canvas = document.getElementById('photoCanvas');
            const ctx = canvas.getContext('2d');
            const faceFilterCanvas = document.getElementById('faceFilterCanvas');
            const faceFilterCtx = faceFilterCanvas.getContext('2d');
            const stickerLayer = document.getElementById('stickerLayer');
            const textOverlay = document.getElementById('textOverlay');
            const camPlaceholder = document.getElementById('camPlaceholder');
            const captureBtn = document.getElementById('captureBtn');
            const selfieBtn = document.getElementById('selfieBtn');
            const uploadInput = document.getElementById('uploadInput');
            const clearPhotoBtn = document.getElementById('clearPhotoBtn');
            const saveBtn = document.getElementById('saveBtn');
            const statusMsg = document.getElementById('statusMsg');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const stickerSpans = document.querySelectorAll('#stickerPicker span');
            const textInput = document.getElementById('textInput');
            const addTextBtn = document.getElementById('addTextBtn');
            const clearTextBtn = document.getElementById('clearTextBtn');
            const faceEffectBtns = document.querySelectorAll('.face-effect-btn');

            // State
            let currentFilter = 'none';
            let currentFaceEffect = 'none';
            let stream = null;
            let photoTaken = false;
            let imageData = null;
            let stickers = [];
            let textElements = [];
            let facingMode = 'environment';
            let animationId = null;
            let isCameraReady = false;

            // Camera init
            async function initCamera(facing = 'environment') {
                try {
                    if (stream) {
                        stream.getTracks().forEach(t => t.stop());
                        stream = null;
                    }

                    const constraints = {
                        video: {
                            facingMode: facing,
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    };

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = stream;
                    await video.play();

                    isCameraReady = true;
                    camPlaceholder.style.display = 'none';
                    statusMsg.textContent = `📸 ${facing === 'user' ? 'selfie' : 'back'} camera ready!`;

                    // Set canvas sizes
                    const w = video.videoWidth || 640;
                    const h = video.videoHeight || 480;
                    canvas.width = w;
                    canvas.height = h;
                    faceFilterCanvas.width = w;
                    faceFilterCanvas.height = h;

                    // Reset state
                    photoTaken = false;
                    canvas.style.display = 'none';
                    video.style.display = 'block';
                    document.getElementById('faceFilterLayer').style.display = 'block';

                    // Start face tracking
                    if (animationId) cancelAnimationFrame(animationId);
                    startFaceTracking();

                } catch (err) {
                    console.error('Camera error:', err);
                    camPlaceholder.textContent = '⚠️ camera not available · upload a photo';
                    statusMsg.textContent = '⚠️ allow camera permission or upload image';
                    isCameraReady = false;
                }
            }

            // Face tracking with effects
            function startFaceTracking() {
                function trackFace() {
                    if (!video.videoWidth || photoTaken) {
                        animationId = requestAnimationFrame(trackFace);
                        return;
                    }

                    const w = faceFilterCanvas.width;
                    const h = faceFilterCanvas.height;

                    // Clear and draw video
                    faceFilterCtx.clearRect(0, 0, w, h);
                    faceFilterCtx.drawImage(video, 0, 0, w, h);

                    // Apply face effect
                    if (currentFaceEffect !== 'none') {
                        const centerX = w * 0.5;
                        const centerY = h * 0.4;
                        const faceSize = Math.min(w, h) * 0.35;

                        faceFilterCtx.save();
                        faceFilterCtx.textAlign = 'center';
                        faceFilterCtx.textBaseline = 'middle';
                        faceFilterCtx.shadowColor = 'rgba(0,0,0,0.8)';
                        faceFilterCtx.shadowBlur = 25;

                        let emoji = '';
                        let size = faceSize * 0.6;

                        switch (currentFaceEffect) {
                            case 'sunglasses':
                                emoji = '😎';
                                size = faceSize * 0.5;
                                faceFilterCtx.fillText(emoji, centerX, centerY - faceSize * 0.1);
                                break;
                            case 'mustache':
                                emoji = '🧔';
                                size = faceSize * 0.4;
                                faceFilterCtx.fillText(emoji, centerX, centerY + faceSize * 0.25);
                                break;
                            case 'clown':
                                emoji = '🤡';
                                size = faceSize * 0.7;
                                faceFilterCtx.fillText(emoji, centerX, centerY);
                                break;
                            case 'robot':
                                emoji = '🤖';
                                size = faceSize * 0.7;
                                faceFilterCtx.fillText(emoji, centerX, centerY);
                                break;
                            case 'glasses':
                                emoji = '👓';
                                size = faceSize * 0.5;
                                faceFilterCtx.fillText(emoji, centerX, centerY - faceSize * 0.05);
                                break;
                            case 'crown':
                                emoji = '👑';
                                size = faceSize * 0.5;
                                faceFilterCtx.fillText(emoji, centerX, centerY - faceSize * 0.4);
                                break;
                            default:
                                break;
                        }

                        if (emoji) {
                            faceFilterCtx.font = `${size}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
                            faceFilterCtx.fillText(emoji, centerX, centerY);
                        }

                        faceFilterCtx.restore();
                    }

                    animationId = requestAnimationFrame(trackFace);
                }

                trackFace();
            }

            // Capture photo with effects
            function capturePhoto() {
                if (!isCameraReady || !video.videoWidth) {
                    statusMsg.textContent = '⚠️ camera not ready · upload an image instead';
                    return;
                }

                const w = video.videoWidth;
                const h = video.videoHeight;
                canvas.width = w;
                canvas.height = h;

                // Draw video
                ctx.drawImage(video, 0, 0, w, h);

                // Draw face effect
                if (currentFaceEffect !== 'none') {
                    const centerX = w * 0.5;
                    const centerY = h * 0.4;
                    const faceSize = Math.min(w, h) * 0.35;

                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    ctx.shadowBlur = 25;

                    let emoji = '';
                    let size = faceSize * 0.6;

                    switch (currentFaceEffect) {
                        case 'sunglasses':
                            emoji = '😎';
                            size = faceSize * 0.5;
                            ctx.fillText(emoji, centerX, centerY - faceSize * 0.1);
                            break;
                        case 'mustache':
                            emoji = '🧔';
                            size = faceSize * 0.4;
                            ctx.fillText(emoji, centerX, centerY + faceSize * 0.25);
                            break;
                        case 'clown':
                            emoji = '🤡';
                            size = faceSize * 0.7;
                            ctx.fillText(emoji, centerX, centerY);
                            break;
                        case 'robot':
                            emoji = '🤖';
                            size = faceSize * 0.7;
                            ctx.fillText(emoji, centerX, centerY);
                            break;
                        case 'glasses':
                            emoji = '👓';
                            size = faceSize * 0.5;
                            ctx.fillText(emoji, centerX, centerY - faceSize * 0.05);
                            break;
                        case 'crown':
                            emoji = '👑';
                            size = faceSize * 0.5;
                            ctx.fillText(emoji, centerX, centerY - faceSize * 0.4);
                            break;
                        default:
                            break;
                    }

                    if (emoji) {
                        ctx.font = `${size}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
                        ctx.fillText(emoji, centerX, centerY);
                    }

                    ctx.restore();
                }

                // Store for filter
                imageData = ctx.getImageData(0, 0, w, h);
                applyFilter(currentFilter);

                photoTaken = true;
                canvas.style.display = 'block';
                video.style.display = 'none';
                document.getElementById('faceFilterLayer').style.display = 'none';
                statusMsg.textContent = '✅ photo captured! add stickers & text';
            }

            // Filter application
            function applyFilter(filterName) {
                if (!imageData) return;

                const imgData = new ImageData(
                    new Uint8ClampedArray(imageData.data),
                    imageData.width,
                    imageData.height
                );
                const data = imgData.data;
                const len = data.length;

                switch (filterName) {
                    case 'grayscale':
                        for (let i = 0; i < len; i += 4) {
                            const gray = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
                            data[i] = gray;
                            data[i + 1] = gray;
                            data[i + 2] = gray;
                        }
                        break;
                    case 'sepia':
                        for (let i = 0; i < len; i += 4) {
                            let r = data[i],
                                g = data[i + 1],
                                b = data[i + 2];
                            data[i] = Math.min(255, (r * 0.393) + (g * 0.769) + (b * 0.189));
                            data[i + 1] = Math.min(255, (r * 0.349) + (g * 0.686) + (b * 0.168));
                            data[i + 2] = Math.min(255, (r * 0.272) + (g * 0.534) + (b * 0.131));
                        }
                        break;
                    case 'warm':
                        for (let i = 0; i < len; i += 4) {
                            data[i] = Math.min(255, data[i] + 30);
                            data[i + 1] = Math.min(255, data[i + 1] + 10);
                            data[i + 2] = Math.max(0, data[i + 2] - 10);
                        }
                        break;
                    case 'cool':
                        for (let i = 0; i < len; i += 4) {
                            data[i] = Math.max(0, data[i] - 10);
                            data[i + 1] = Math.min(255, data[i + 1] + 10);
                            data[i + 2] = Math.min(255, data[i + 2] + 30);
                        }
                        break;
                    default:
                        break;
                }

                ctx.putImageData(imgData, 0, 0);
            }

            // Upload image
            function handleUpload(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        applyFilter(currentFilter);
                        photoTaken = true;
                        canvas.style.display = 'block';
                        video.style.display = 'none';
                        document.getElementById('faceFilterLayer').style.display = 'none';
                        statusMsg.textContent = '🖼️ image uploaded';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            // Clear photo
            function clearPhoto() {
                if (stream) {
                    photoTaken = false;
                    canvas.style.display = 'none';
                    video.style.display = 'block';
                    document.getElementById('faceFilterLayer').style.display = 'block';
                    imageData = null;
                    clearStickers();
                    clearAllText();
                    statusMsg.textContent = '📷 back to camera';
                    startFaceTracking();
                } else {
                    statusMsg.textContent = '📷 no camera, upload a photo';
                }
            }

            // Stickers
            function addSticker(emoji) {
                const layer = stickerLayer;
                const x = 10 + Math.random() * 60;
                const y = 10 + Math.random() * 60;
                const size = 55 + Math.random() * 25;

                const img = document.createElement('img');
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 120;
                tempCanvas.height = 120;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.font = '90px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
                tempCtx.textAlign = 'center';
                tempCtx.textBaseline = 'middle';
                tempCtx.shadowColor = 'rgba(0,0,0,0.5)';
                tempCtx.shadowBlur = 14;
                tempCtx.fillText(emoji, 60, 64);
                img.src = tempCanvas.toDataURL();
                img.style.width = size + 'px';
                img.style.height = size + 'px';
                img.style.left = x + '%';
                img.style.top = y + '%';
                img.draggable = true;

                // Drag support
                let isDragging = false;
                let startX, startY, origLeft, origTop;

                const startDrag = (clientX, clientY) => {
                    isDragging = true;
                    startX = clientX;
                    startY = clientY;
                    origLeft = parseFloat(img.style.left);
                    origTop = parseFloat(img.style.top);
                    img.style.cursor = 'grabbing';
                };

                const moveDrag = (clientX, clientY) => {
                    if (!isDragging) return;
                    const dx = clientX - startX;
                    const dy = clientY - startY;
                    const parentRect = layer.getBoundingClientRect();
                    const newLeft = origLeft + (dx / parentRect.width) * 100;
                    const newTop = origTop + (dy / parentRect.height) * 100;
                    img.style.left = Math.min(90, Math.max(0, newLeft)) + '%';
                    img.style.top = Math.min(90, Math.max(0, newTop)) + '%';
                };

                const endDrag = () => {
                    isDragging = false;
                    img.style.cursor = 'grab';
                };

                img.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    startDrag(e.clientX, e.clientY);
                    e.preventDefault();
                });

                document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
                document.addEventListener('mouseup', endDrag);

                img.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    if (!touch) return;
                    startDrag(touch.clientX, touch.clientY);
                    e.preventDefault();
                }, { passive: false });

                img.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    if (!touch) return;
                    moveDrag(touch.clientX, touch.clientY);
                    e.preventDefault();
                }, { passive: false });

                img.addEventListener('touchend', endDrag);

                layer.appendChild(img);
                stickers.push({ emoji, element: img });
                statusMsg.textContent = `✨ added ${emoji}`;
            }

            function clearStickers() {
                stickerLayer.innerHTML = '';
                stickers = [];
            }

            // Text
            function addText(text) {
                if (!text.trim()) {
                    statusMsg.textContent = '✏️ please write some text';
                    return;
                }
                const div = document.createElement('div');
                div.textContent = text;
                const x = 10 + Math.random() * 60;
                const y = 10 + Math.random() * 60;
                div.style.left = x + '%';
                div.style.top = y + '%';
                div.draggable = true;

                let isDragging = false;
                let startX, startY, origLeft, origTop;

                const startDrag = (clientX, clientY) => {
                    isDragging = true;
                    startX = clientX;
                    startY = clientY;
                    origLeft = parseFloat(div.style.left);
                    origTop = parseFloat(div.style.top);
                    div.style.cursor = 'grabbing';
                };

                const moveDrag = (clientX, clientY) => {
                    if (!isDragging) return;
                    const dx = clientX - startX;
                    const dy = clientY - startY;
                    const parentRect = textOverlay.getBoundingClientRect();
                    const newLeft = origLeft + (dx / parentRect.width) * 100;
                    const newTop = origTop + (dy / parentRect.height) * 100;
                    div.style.left = Math.min(90, Math.max(0, newLeft)) + '%';
                    div.style.top = Math.min(90, Math.max(0, newTop)) + '%';
                };

                const endDrag = () => {
                    isDragging = false;
                    div.style.cursor = 'grab';
                };

                div.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    startDrag(e.clientX, e.clientY);
                    e.preventDefault();
                });

                document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
                document.addEventListener('mouseup', endDrag);

                div.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    if (!touch) return;
                    startDrag(touch.clientX, touch.clientY);
                    e.preventDefault();
                }, { passive: false });

                div.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    if (!touch) return;
                    moveDrag(touch.clientX, touch.clientY);
                    e.preventDefault();
                }, { passive: false });

                div.addEventListener('touchend', endDrag);

                textOverlay.appendChild(div);
                textElements.push(div);
                statusMsg.textContent = `✏️ added "${text}"`;
                textInput.value = '';
            }

            function clearAllText() {
                textOverlay.innerHTML = '';
                textElements = [];
            }

            // Save
            function savePhoto() {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                const w = canvas.width || 640;
                const h = canvas.height || 480;
                tempCanvas.width = w;
                tempCanvas.height = h;

                tempCtx.drawImage(canvas, 0, 0, w, h);

                // Draw stickers
                const stickerImgs = stickerLayer.querySelectorAll('img');
                stickerImgs.forEach(img => {
                    const rect = img.getBoundingClientRect();
                    const parentRect = stickerLayer.getBoundingClientRect();
                    const x = (rect.left - parentRect.left) / parentRect.width * w;
                    const y = (rect.top - parentRect.top) / parentRect.height * h;
                    const size = rect.width / parentRect.width * w;
                    tempCtx.drawImage(img, x, y, size, size);
                });

                // Draw text
                const textDivs = textOverlay.querySelectorAll('div');
                textDivs.forEach(div => {
                    const rect = div.getBoundingClientRect();
                    const parentRect = textOverlay.getBoundingClientRect();
                    const x = (rect.left - parentRect.left) / parentRect.width * w;
                    const y = (rect.top - parentRect.top) / parentRect.height * h;
                    const fontSize = parseFloat(window.getComputedStyle(div).fontSize) || 28;
                    const scaledSize = (fontSize / parentRect.height) * h;
                    tempCtx.font = `bold ${scaledSize}px "Segoe UI", sans-serif`;
                    tempCtx.textAlign = 'left';
                    tempCtx.textBaseline = 'top';
                    tempCtx.shadowColor = 'rgba(0,0,0,0.8)';
                    tempCtx.shadowBlur = 12;
                    tempCtx.fillStyle = 'white';
                    tempCtx.fillText(div.textContent, x, y);
                });

                const link = document.createElement('a');
                link.download = `face_studio_${Date.now()}.png`;
                link.href = tempCanvas.toDataURL('image/png');
                link.click();
                statusMsg.textContent = '💾 photo saved!';
            }

            // UI helpers
            function setActiveFilter(filterName) {
                filterBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.filter === filterName);
                });
                currentFilter = filterName;
                if (imageData && photoTaken) {
                    applyFilter(filterName);
                }
                statusMsg.textContent = `🎨 filter: ${filterName}`;
            }

            function setFaceEffect(effect) {
                faceEffectBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.effect === effect);
                });
                currentFaceEffect = effect;
                statusMsg.textContent = `🎭 effect: ${effect || 'none'}`;
            }

            // Event bindings
            captureBtn.addEventListener('click', capturePhoto);

            selfieBtn.addEventListener('click', () => {
                facingMode = 'user';
                initCamera('user');
            });

            uploadInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    handleUpload(e.target.files[0]);
                }
                uploadInput.value = '';
            });

            clearPhotoBtn.addEventListener('click', clearPhoto);
            saveBtn.addEventListener('click', savePhoto);

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => setActiveFilter(btn.dataset.filter));
            });

            stickerSpans.forEach(span => {
                span.addEventListener('click', () => {
                    const emoji = span.dataset.sticker;
                    if (emoji) addSticker(emoji);
                });
            });

            addTextBtn.addEventListener('click', () => addText(textInput.value));
            textInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') addText(textInput.value);
            });
            clearTextBtn.addEventListener('click', clearAllText);

            faceEffectBtns.forEach(btn => {
                btn.addEventListener('click', () => setFaceEffect(btn.dataset.effect));
            });

            // Start with back camera
            initCamera('environment');

            // Double-click canvas to go back
            canvas.addEventListener('dblclick', clearPhoto);

        })();
    </script>
</body>
</html>
